<title>AX Colleague Engagement Survey 2026</title>
<style>
@font-face {
  font-family: "Area Normal";
  src: local("Area Normal"), url("file:///C:/Windows/Fonts/AreaNormal-Regular%201.otf") format("opentype");
  font-weight: 400;
}
@font-face {
  font-family: "Area Normal Extrabold";
  src: local("Area Normal Extrabold"), url("file:///C:/Windows/Fonts/AreaNormal-Extrabold%201.otf") format("opentype");
  font-weight: 400;
}
:root {
  --ink: #242424;
  --blue: #70D6FF;
  --red: #F85858;
  --green: #AEEB59;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, #ffffff 0%, #f7f7f7 45%, #e9f9ff 100%);
  color: var(--ink);
  font-family: "Area Normal", Arial, Helvetica, sans-serif;
}
.gate {
  width: min(92vw, 560px);
  background: white;
  border: 1px solid #e3e3e3;
  border-top: 8px solid var(--blue);
  border-radius: 8px;
  padding: 28px;
  box-shadow: 0 18px 45px rgba(36,36,36,.08);
}
h1 {
  margin: 0 0 12px;
  font-family: "Area Normal Extrabold", "Area Normal", Arial, sans-serif;
  font-size: clamp(34px, 7vw, 58px);
  line-height: .95;
  font-weight: 400;
}
p { margin: 0 0 18px; color: #3a3a3a; font-size: 18px; line-height: 1.4; }
label { display: block; margin-bottom: 8px; font-size: 14px; color: #606060; }
input {
  width: 100%;
  border: 1px solid var(--ink);
  border-radius: 6px;
  padding: 13px 14px;
  font: 18px/1.2 "Area Normal", Arial, sans-serif;
}
button {
  margin-top: 14px;
  width: 100%;
  border: 0;
  border-radius: 6px;
  padding: 14px;
  background: var(--ink);
  color: white;
  font: 18px/1 "Area Normal Extrabold", "Area Normal", Arial, sans-serif;
  cursor: pointer;
}
.error { display: none; margin-top: 12px; color: var(--red); font-size: 14px; }
.hint { margin-top: 16px; font-size: 13px; color: #606060; }
</style>
</head>

function fromBase64(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let index = 0; index < binary.length; index += 1) {
    bytes[index] = binary.charCodeAt(index);
  }
  return bytes;
}

    throw new Error("Invalid password");
  }
  const plainBuffer = await crypto.subtle.decrypt(
    { name: "AES-CBC", iv },
    aesKey,
    cipher
  );
  return new TextDecoder().decode(plainBuffer);
}

document.getElementById("unlockForm").addEventListener("submit", async event => {
  event.preventDefault();
  const error = document.getElementById("error");
  error.style.display = "none";
  try {
    const html = await unlock(document.getElementById("password").value);
    document.open();
    document.write(html);
    document.close();
  } catch {
    error.style.display = "block";
  }
});
</script>
