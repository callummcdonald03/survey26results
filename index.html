<style>
@font-face {
  font-family: "Area Normal";
  src: local("Area Normal"), url("file:///C:/Windows/Fonts/AreaNormal-Regular%201.otf") format("opentype");
  font-weight: 400;
}
@font-face {
  font-family: "Area Normal Extrabold";
  src: local("Area Normal Extrabold"), url("file:///C:/Windows/Fonts/AreaNormal-Extrabold%201.otf") format("opentype");
  font-weight: 400;
}
:root {
  --ink: #242424;
  --blue: #70D6FF;
  --red: #F85858;
  --green: #AEEB59;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, #ffffff 0%, #f7f7f7 45%, #e9f9ff 100%);
  color: var(--ink);
  font-family: "Area Normal", Arial, Helvetica, sans-serif;
}
.gate {
  width: min(92vw, 560px);
  background: white;
  border: 1px solid #e3e3e3;
  border-top: 8px solid var(--blue);
  border-radius: 8px;
  padding: 28px;
  box-shadow: 0 18px 45px rgba(36,36,36,.08);
}
h1 {
  margin: 0 0 12px;
  font-family: "Area Normal Extrabold", "Area Normal", Arial, sans-serif;
  font-size: clamp(34px, 7vw, 58px);
  line-height: .95;
  font-weight: 400;
}
p { margin: 0 0 18px; color: #3a3a3a; font-size: 18px; line-height: 1.4; }
label { display: block; margin-bottom: 8px; font-size: 14px; color: #606060; }
input {
  width: 100%;
  border: 1px solid var(--ink);
  border-radius: 6px;
  padding: 13px 14px;
  font: 18px/1.2 "Area Normal", Arial, sans-serif;
}
button {
  margin-top: 14px;
  width: 100%;
  border: 0;
  border-radius: 6px;
  padding: 14px;
  background: var(--ink);
  color: white;
  font: 18px/1 "Area Normal Extrabold", "Area Normal", Arial, sans-serif;
  cursor: pointer;
}
.error { display: none; margin-top: 12px; color: var(--red); font-size: 14px; }
.hint { margin-top: 16px; font-size: 13px; color: #606060; }
</style>
</head>

function fromBase64(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let index = 0; index < binary.length; index += 1) {
    bytes[index] = binary.charCodeAt(index);
  }
  return bytes;
}

async function unlock(password) {
  const encoder = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    encoder.encode(password),
    "PBKDF2",
    false,
    ["deriveBits"]
  );
  const derivedBits = await crypto.subtle.deriveBits(
    {
      name: "PBKDF2",
      salt: fromBase64(encryptedReport.salt),
      iterations: encryptedReport.iterations,
      hash: "SHA-256"
    },
    keyMaterial,
    512
  );
  const derived = new Uint8Array(derivedBits);
  const aesKeyBytes = derived.slice(0, 32);
  const authKeyBytes = derived.slice(32, 64);
  const aesKey = await crypto.subtle.importKey("raw", aesKeyBytes, "AES-CBC", false, ["decrypt"]);
  const authKey = await crypto.subtle.importKey(
    "raw",
    authKeyBytes,
    { name: "HMAC", hash: "SHA-256" },
    false,
    ["verify"]
  );
  const cipher = fromBase64(encryptedReport.cipher);
  const tag = fromBase64(encryptedReport.tag);
  const salt = fromBase64(encryptedReport.salt);
  const iv = fromBase64(encryptedReport.iv);
  const macInput = new Uint8Array(salt.length + iv.length + cipher.length);
  macInput.set(salt, 0);
  macInput.set(iv, salt.length);
  macInput.set(cipher, salt.length + iv.length);
  const valid = await crypto.subtle.verify("HMAC", authKey, tag, macInput);
  if (!valid) {
    throw new Error("Invalid password");
  }
  const plainBuffer = await crypto.subtle.decrypt(
    { name: "AES-CBC", iv },
    aesKey,
    cipher
  );
  return new TextDecoder().decode(plainBuffer);
}

document.getElementById("unlockForm").addEventListener("submit", async event => {
  event.preventDefault();
  const error = document.getElementById("error");
  error.style.display = "none";
  try {
    const html = await unlock(document.getElementById("password").value);
    document.open();
    document.write(html);
    document.close();
  } catch {
    error.style.display = "block";
  }
});
